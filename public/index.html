<script>
  // Same simple storage shape as before, backed by the browser's own local storage.
  window.storage = {
    get: async (key) => {
      const raw = localStorage.getItem(key);
      if (raw === null) return null;
      return { key, value: raw, shared: false };
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    delete: async (key) => {
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed, shared: false };
    },
    list: async (prefix = "") => {
      const keys = Object.keys(localStorage).filter((k) => k.startsWith(prefix));
      return { keys, prefix, shared: false };
    },
  };
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;


// ---------- Helpers ----------
const pad = (n) => String(n).padStart(2, "0");
const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const startOfWeek = (d) => {
  const copy = new Date(d);
  const day = (copy.getDay() + 6) % 7;
  copy.setDate(copy.getDate() - day);
  copy.setHours(0, 0, 0, 0);
  return copy;
};
const addDays = (d, n) => {
  const copy = new Date(d);
  copy.setDate(copy.getDate() + n);
  return copy;
};
const monthKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
const yearKey = (d) => `${d.getFullYear()}`;
const weekKeyOf = (d) => dateKey(startOfWeek(d));
const parseDate = (iso) => new Date(iso + "T00:00:00");
const WEEKDAYS = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
const WEEKDAYS_FULL = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const uid = () => Math.random().toString(36).slice(2, 10);
const fmtShort = (iso) => {
  const [y, m, d] = iso.split("-").map(Number);
  return `${d}. ${MONTHS[m - 1].slice(0, 3)}`;
};
const fmtWeek = (wKey) => `Woche ab ${fmtShort(wKey)}`;

// ---------- Storage ----------
const STORE_KEY = "planner-data-v4";

function useStore() {
  const [data, setData] = useState({ days: {}, weeks: {}, months: {}, years: {} });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORE_KEY);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          setData({ days: {}, weeks: {}, months: {}, years: {}, ...parsed });
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  const save = useCallback((next) => {
    setData(next);
    window.storage.set(STORE_KEY, JSON.stringify(next)).catch(() => {});
    fetch("/.netlify/functions/sync-data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(next),
    }).catch(() => {});
  }, []);

  return [data, save, loaded];
}

// ---------- Notifications ----------
const VAPID_PUBLIC_KEY = "BEvXWPBFPdGuo-oS2QxjmOtb8Tc3NLWiIoOsbgH8R_8VqP1QnUc0OFH4p1WU9yrdzs1ZUTSrVhtRKK3yk-E9zY4";

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function subscribeForPush() {
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
    const registration = await navigator.serviceWorker.register("/sw.js");
    await navigator.serviceWorker.ready;
    let subscription = await registration.pushManager.getSubscription();
    if (!subscription) {
      subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    await fetch("/.netlify/functions/save-subscription", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(subscription),
    });
  } catch (err) {
    console.error("Push-Anmeldung fehlgeschlagen", err);
  }
}

function useReminders(data) {
  const [permission, setPermission] = useState(
    typeof Notification !== "undefined" ? Notification.permission : "unsupported"
  );
  const requestPermission = () => {
    if (typeof Notification === "undefined") return;
    Notification.requestPermission().then((p) => {
      setPermission(p);
      if (p === "granted") subscribeForPush();
    });
  };
  useEffect(() => {
    if (permission === "granted") subscribeForPush();
  }, [permission]);
  return { permission, requestPermission };
}

function focusRate(data, themeId, cursor, lookbackDays = 7) {
  let count = 0;
  let total = 0;
  for (let i = 0; i < lookbackDays; i++) {
    const k = dateKey(addDays(cursor, -i));
    const v = data.days[k]?.focusChecks?.[themeId];
    if (v !== undefined) {
      total += 1;
      if (v) count += 1;
    }
  }
  return { count, total };
}

// ---------- Cross-level gathering ----------
// Month/Year goal subtasks can be assigned directly to a day, or to a week
// (and then broken down further into day-level children within that week).
function collectAdvancedSubtasks(data, bucketName, sourceLabel) {
  const out = [];
  Object.entries(data[bucketName] || {}).forEach(([containerKey, container]) => {
    (container.goals || []).forEach((g) => {
      (g.subtasks || []).forEach((s) => {
        out.push({ ...s, goalTitle: g.title, goalId: g.id, bucket: bucketName, containerKey, sourceLabel });
      });
    });
  });
  return out;
}

function getAssignedForDay(data, cursor) {
  const dKey = dateKey(cursor);
  const out = [];
  // week-level goals -> subtasks assigned directly to a day
  Object.entries(data.weeks || {}).forEach(([wk, week]) => {
    (week.goals || []).forEach((g) => {
      (g.subtasks || []).forEach((s) => {
        if (s.date === dKey) out.push({ id: s.id, title: s.title, done: s.done, goalTitle: g.title, sourceLabel: "Wochenziel", kind: "week-sub", bucket: "weeks", containerKey: wk, goalId: g.id });
      });
    });
  });
  // month/year goals -> subtasks assigned directly to a day
  ["months", "years"].forEach((bucket) => {
    const label = bucket === "months" ? "Monatsziel" : "Jahresziel";
    collectAdvancedSubtasks(data, bucket, label).forEach((s) => {
      if (s.scope === "day" && s.date === dKey) {
        out.push({ id: s.id, title: s.title, done: s.done, goalTitle: s.goalTitle, sourceLabel: label, kind: "adv-sub", bucket: s.bucket, containerKey: s.containerKey, goalId: s.goalId });
      }
      if (s.scope === "week") {
        (s.children || []).forEach((c) => {
          if (c.date === dKey) {
            out.push({ id: c.id, title: c.title, done: c.done, goalTitle: s.goalTitle, sourceLabel: label, kind: "adv-child", bucket: s.bucket, containerKey: s.containerKey, goalId: s.goalId, subId: s.id });
          }
        });
      }
    });
  });
  return out;
}

function getAssignedForWeek(data, wKey) {
  const out = [];
  ["months", "years"].forEach((bucket) => {
    const label = bucket === "months" ? "Monatsziel" : "Jahresziel";
    collectAdvancedSubtasks(data, bucket, label).forEach((s) => {
      if (s.scope === "week" && s.weekKey === wKey) {
        out.push({ ...s, sourceLabel: label });
      }
    });
  });
  return out;
}

function toggleDayAssigned(data, save, item) {
  if (item.kind === "week-sub") {
    const container = data.weeks[item.containerKey];
    const goals = container.goals.map((g) => g.id === item.goalId ? { ...g, subtasks: g.subtasks.map((s) => s.id === item.id ? { ...s, done: !s.done } : s) } : g);
    save({ ...data, weeks: { ...data.weeks, [item.containerKey]: { ...container, goals } } });
  } else if (item.kind === "adv-sub") {
    const container = data[item.bucket][item.containerKey];
    const goals = container.goals.map((g) => g.id === item.goalId ? { ...g, subtasks: g.subtasks.map((s) => s.id === item.id ? { ...s, done: !s.done } : s) } : g);
    save({ ...data, [item.bucket]: { ...data[item.bucket], [item.containerKey]: { ...container, goals } } });
  } else if (item.kind === "adv-child") {
    const container = data[item.bucket][item.containerKey];
    const goals = container.goals.map((g) => g.id === item.goalId ? {
      ...g,
      subtasks: g.subtasks.map((s) => s.id === item.subId ? { ...s, children: s.children.map((c) => c.id === item.id ? { ...c, done: !c.done } : c) } : s),
    } : g);
    save({ ...data, [item.bucket]: { ...data[item.bucket], [item.containerKey]: { ...container, goals } } });
  }
}

// generic child (day-breakdown) management for a week-scoped subtask, wherever it lives (months or years)
function addChildGeneric(data, save, item, title, date) {
  const container = data[item.bucket][item.containerKey];
  const goals = container.goals.map((g) => g.id === item.goalId ? { ...g, subtasks: g.subtasks.map((s) => s.id === item.id ? { ...s, children: [...(s.children || []), { id: uid(), title, done: false, date }] } : s) } : g);
  save({ ...data, [item.bucket]: { ...data[item.bucket], [item.containerKey]: { ...container, goals } } });
}
function toggleChildGeneric(data, save, item, childId) {
  const container = data[item.bucket][item.containerKey];
  const goals = container.goals.map((g) => g.id === item.goalId ? { ...g, subtasks: g.subtasks.map((s) => s.id === item.id ? { ...s, children: s.children.map((c) => c.id === childId ? { ...c, done: !c.done } : c) } : s) } : g);
  save({ ...data, [item.bucket]: { ...data[item.bucket], [item.containerKey]: { ...container, goals } } });
}
function removeChildGeneric(data, save, item, childId) {
  const container = data[item.bucket][item.containerKey];
  const goals = container.goals.map((g) => g.id === item.goalId ? { ...g, subtasks: g.subtasks.map((s) => s.id === item.id ? { ...s, children: s.children.filter((c) => c.id !== childId) } : s) } : g);
  save({ ...data, [item.bucket]: { ...data[item.bucket], [item.containerKey]: { ...container, goals } } });
}

// (image upload/compression helper removed along with the image-based vision board)

// ---------- Small toggleable info hint ("i" icon that reveals/hides explanatory text) ----------
function InfoHint({ text }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={S.infoHintWrap}>
      <button style={S.infoHintBtn} onClick={() => setOpen((o) => !o)} aria-label="Hinweis anzeigen">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.8" />
          <circle cx="12" cy="7.5" r="1.15" fill="currentColor" />
          <line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" />
        </svg>

// ---------- Main App ----------
function App() {
  const [data, save, loaded] = useStore();
  const [tab, setTab] = useState("day");
  const [cursor, setCursor] = useState(new Date());
  const { permission, requestPermission } = useReminders(data);

  if (!loaded) return <div style={S.loading}>lädt …</div>;

  return (
    <div style={S.app}>
      <style>{globalCss}</style>
      {tab !== "day" && (
        <TopBar tab={tab} cursor={cursor} setCursor={setCursor} permission={permission} requestPermission={requestPermission} />
      )}
      <div style={S.body}>
        {tab === "day" && <DayView data={data} save={save} cursor={cursor} setCursor={setCursor} permission={permission} requestPermission={requestPermission} />}
        {tab === "week" && <WeekView data={data} save={save} cursor={cursor} setCursor={setCursor} setTab={setTab} />}
        {tab === "month" && <MonthView data={data} save={save} cursor={cursor} setCursor={setCursor} setTab={setTab} />}
        {tab === "goals" && <ZieleView data={data} save={save} cursor={cursor} setCursor={setCursor} setTab={setTab} />}
      </div>
      <TabBar tab={tab} setTab={setTab} />
    </div>
  );
}

// ---------- Top bar for week/month/year ----------
function TopBar({ tab, cursor, setCursor, permission, requestPermission }) {
  const title =
    tab === "week" ? `Woche vom ${startOfWeek(cursor).getDate()}. ${MONTHS[startOfWeek(cursor).getMonth()]}` :
    tab === "month" ? `${MONTHS[cursor.getMonth()]} ${cursor.getFullYear()}` :
    `${cursor.getFullYear()}`;
  const step = (dir) => {
    if (tab === "week") setCursor(addDays(cursor, dir * 7));
    else if (tab === "month") { const c = new Date(cursor); c.setMonth(c.getMonth() + dir); setCursor(c); }
    else { const c = new Date(cursor); c.setFullYear(c.getFullYear() + dir); setCursor(c); }
  };
  // vision tab reuses the year/month step logic (steps by year)
  return (
    <div style={S.topBar}>
      <div style={S.topBarRow}>
        <span style={S.brand}>VORHABEN</span>
        {permission !== "granted" && permission !== "unsupported" && (
          <button style={S.bellBtn} onClick={requestPermission}>🔔 Erinnerungen</button>
        )}
      </div>
      <div style={S.topBarNav}>
        <button style={S.navBtn} onClick={() => step(-1)}>‹</button>
        <div style={S.topBarTitle}>{title}</div>
        <button style={S.navBtn} onClick={() => step(1)}>›</button>
      </div>
    </div>
  );
}

// ---------- Day View ----------
function DayView({ data, save, cursor, setCursor, permission, requestPermission }) {
  const key = dateKey(cursor);
  const day = data.days[key] || { items: [] };
  const [text, setText] = useState("");
  const [time, setTime] = useState("");
  const [newFocusTheme, setNewFocusTheme] = useState("");
  const isToday = dateKey(new Date()) === key;
  const focusThemes = data.focusThemes || [];
  const focusChecks = day.focusChecks || {};

  const addItem = () => {
    if (!text.trim()) return;
    const items = [...day.items, { id: uid(), title: text.trim(), time: time || null, done: false }];
    save({ ...data, days: { ...data.days, [key]: { ...day, items } } });
    setText("");
    setTime("");
  };
  const toggle = (id) => {
    const items = day.items.map((t) => (t.id === id ? { ...t, done: !t.done } : t));
    save({ ...data, days: { ...data.days, [key]: { ...day, items } } });
  };
  const remove = (id) => {
    const items = day.items.filter((t) => t.id !== id);
    save({ ...data, days: { ...data.days, [key]: { ...day, items } } });
  };

  const addFocusTheme = () => {
    if (!newFocusTheme.trim()) return;
    save({ ...data, focusThemes: [...focusThemes, { id: uid(), title: newFocusTheme.trim() }] });
    setNewFocusTheme("");
  };
  const removeFocusTheme = (id) => {
    save({ ...data, focusThemes: focusThemes.filter((t) => t.id !== id) });
  };
  const setFocusCheck = (themeId, value) => {
    const nextChecks = { ...focusChecks, [themeId]: value };
    save({ ...data, days: { ...data.days, [key]: { ...day, focusChecks: nextChecks } } });
  };

  const termine = day.items.filter((t) => t.time).sort((a, b) => a.time.localeCompare(b.time));
  const plan = day.items.filter((t) => !t.time);
  const assigned = getAssignedForDay(data, cursor);
  const totalCount = day.items.length + assigned.length;
  const doneCount = day.items.filter((t) => t.done).length + assigned.filter((t) => t.done).length;
  const pct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

  return (
    <div style={S.dayPage}>
      <div style={S.dateHeader}>
        <div style={S.dateHeaderLeft}>
          <div style={S.brand}>VORHABEN</div>
          {permission !== "granted" && permission !== "unsupported" && (
            <button style={S.bellBtnSmall} onClick={requestPermission}>🔔</button>
          )}
        </div>
        <div style={S.dateHeaderRow}>
          <button style={S.navBtnGhost} onClick={() => setCursor(addDays(cursor, -1))}>‹</button>
          <div style={S.dateBlock}>
            <div style={S.weekdayLabel}>{WEEKDAYS_FULL[(cursor.getDay() + 6) % 7]}</div>
            <div style={S.bigDate}>{cursor.getDate()}</div>
            <div style={S.monthLabel}>{MONTHS[cursor.getMonth()]}</div>
          </div>
          <button style={S.navBtnGhost} onClick={() => setCursor(addDays(cursor, 1))}>›</button>
        </div>
        {!isToday && <button style={S.todayLink} onClick={() => setCursor(new Date())}>Heute</button>}
        <div style={S.inkTrack}><div style={{ ...S.inkFill, width: `${pct}%` }} /></div>
      </div>

      <div style={S.termineSticky}>
        <div style={S.sectionLabel}>Termine</div>
        {termine.length === 0 ? (
          <div style={S.emptySmall}>Keine festen Termine heute</div>
        ) : (
          <div style={S.list}>
            {termine.map((t) => (
              <div key={t.id} style={S.termineRow}>
                <button style={{ ...S.checkbox, ...(t.done ? S.checkboxDone : {}) }} onClick={() => toggle(t.id)}>{t.done ? "✓" : ""}</button>
                <div style={{ ...S.taskTitle, flex: 1, ...(t.done ? S.taskDone : {}) }}>{t.title}</div>
                <div style={S.termineTime}>{t.time}</div>
                <button style={S.removeBtn} onClick={() => remove(t.id)}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={S.planScroll}>
        {focusThemes.length > 0 && (
          <>
            <div style={S.sectionLabel}>Fokus – hast du dich heute daran gehalten?</div>
            <div style={{ ...S.list, marginBottom: 22 }}>
              {focusThemes.map((ft) => {
                const rate = focusRate(data, ft.id, cursor);
                const val = focusChecks[ft.id];
                return (
                  <div key={ft.id} style={S.focusThemeRow}>
                    <div style={{ flex: 1 }}>
                      <div style={S.taskTitle}>{ft.title}</div>
                      {rate.total > 0 && <div style={S.goalTag}>{rate.count}/{rate.total} der letzten Tage eingehalten</div>}
                    </div>
                    <button style={{ ...S.focusYesBtn, ...(val === true ? S.focusYesBtnActive : {}) }} onClick={() => setFocusCheck(ft.id, true)}>✓</button>
                    <button style={{ ...S.focusNoBtn, ...(val === false ? S.focusNoBtnActive : {}) }} onClick={() => setFocusCheck(ft.id, false)}>✗</button>
                    <button style={S.removeBtn} onClick={() => removeFocusTheme(ft.id)}>×</button>
                  </div>
                );
              })}
            </div>
          </>
        )}
        <div style={{ ...S.addRow, marginBottom: 22 }}>
          <input style={S.input} placeholder="z.B. Kein TikTok, mehr fürs Business …" value={newFocusTheme} onChange={(e) => setNewFocusTheme(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addFocusTheme()} />
          <button style={S.addBtn} onClick={addFocusTheme}>+</button>
          <InfoHint text="Trag Dinge ein, bei denen du merkst, dass dir Disziplin schwerfällt. Jeden Tag kurz ehrlich einschätzen – kein Streak-Druck, nur eine Übersicht." />
        </div>

        {assigned.length > 0 && (
          <>
            <div style={S.sectionLabel}>Aus deinen Zielen</div>
            <div style={{ ...S.list, marginBottom: 22 }}>
              {assigned.map((s) => (
                <div key={s.kind + s.id} style={S.goalTaskRow}>
                  <button style={{ ...S.checkbox, ...(s.done ? S.checkboxDone : {}) }} onClick={() => toggleDayAssigned(data, save, s)}>{s.done ? "✓" : ""}</button>
                  <div style={{ flex: 1 }}>
                    <div style={{ ...S.taskTitle, ...(s.done ? S.taskDone : {}) }}>{s.title}</div>
                    <div style={S.goalTag}>{s.sourceLabel} · {s.goalTitle}</div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        <div style={S.sectionLabel}>Tagesplan</div>
        <div style={S.list}>
          {plan.length === 0 && <div style={S.emptySmall}>Was steht sonst noch an?</div>}
          {plan.map((t) => (
            <div key={t.id} style={S.taskRow}>
              <button style={{ ...S.checkbox, ...(t.done ? S.checkboxDone : {}) }} onClick={() => toggle(t.id)}>{t.done ? "✓" : ""}</button>
              <div style={{ ...S.taskTitle, flex: 1, ...(t.done ? S.taskDone : {}) }}>{t.title}</div>
              <button style={S.removeBtn} onClick={() => remove(t.id)}>×</button>
            </div>
          ))}
        </div>

        <div style={S.addRow}>
          <input style={S.input} placeholder="Neuer Punkt oder Termin …" value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addItem()} />
          <input style={S.timeInput} type="time" value={time} onChange={(e) => setTime(e.target.value)} />
          <button style={S.addBtn} onClick={addItem}>+</button>
          <InfoHint text="Uhrzeit eintragen → wird oben als Termin fixiert. Ohne Uhrzeit → landet im Tagesplan. Für einen zukünftigen Tag: einfach im Monat auf den Tag tippen und dort eintragen." />
        </div>
      </div>
    </div>
  );
}

// ---------- Simple Goals (Week level: subtasks assign only to a day) ----------
function WeekGoalsSection({ goals, onAddGoal, onToggleGoal, onRemoveGoal, onAddSubtask, onToggleSubtask, onRemoveSubtask }) {
  const [goalText, setGoalText] = useState("");
  const [openId, setOpenId] = useState(null);
  const [subText, setSubText] = useState({});
  const [subDate, setSubDate] = useState({});

  return (
    <>
      <div style={S.sectionLabel}>Wochenziele</div>
      <div style={S.list}>
        {goals.length === 0 && <div style={S.emptySmall}>Was soll diese Woche stehen?</div>}
        {goals.map((g) => {
          const open = openId === g.id;
          const subs = g.subtasks || [];
          const subDone = subs.filter((s) => s.done).length;
          return (
            <div key={g.id} style={S.goalCard}>
              <div style={S.taskRowFlat}>
                <button style={{ ...S.checkbox, ...(g.done ? S.checkboxDone : {}) }} onClick={() => onToggleGoal(g.id)}>{g.done ? "✓" : ""}</button>
                <div style={{ ...S.taskTitle, flex: 1, ...(g.done ? S.taskDone : {}) }}>
                  {g.title}{subs.length > 0 && <span style={S.subCount}> · {subDone}/{subs.length}</span>}
                </div>
                <button style={S.expandBtn} onClick={() => setOpenId(open ? null : g.id)}>{open ? "–" : "+"}</button>
                <button style={S.removeBtn} onClick={() => onRemoveGoal(g.id)}>×</button>
              </div>
              {open && (
                <div style={S.subsWrap}>
                  {subs.map((s) => (
                    <div key={s.id} style={S.subRow}>
                      <button style={{ ...S.checkboxSmall, ...(s.done ? S.checkboxDone : {}) }} onClick={() => onToggleSubtask(g.id, s.id)}>{s.done ? "✓" : ""}</button>
                      <div style={{ flex: 1 }}>
                        <div style={{ ...S.subTitle, ...(s.done ? S.taskDone : {}) }}>{s.title}</div>
                        {s.date && <div style={S.subDateTag}>{fmtShort(s.date)}</div>}
                      </div>
                      <button style={S.removeBtn} onClick={() => onRemoveSubtask(g.id, s.id)}>×</button>
                    </div>
                  ))}
                  <div style={S.subAddRow}>
                    <input style={S.subInput} placeholder="Unterpunkt …" value={subText[g.id] || ""} onChange={(e) => setSubText({ ...subText, [g.id]: e.target.value })} />
                    <input style={S.subDateInput} type="date" value={subDate[g.id] || ""} onChange={(e) => setSubDate({ ...subDate, [g.id]: e.target.value })} />
                    <button style={S.subAddBtn} onClick={() => {
                      const t = (subText[g.id] || "").trim();
                      if (!t) return;
                      onAddSubtask(g.id, t, subDate[g.id] || null);
                      setSubText({ ...subText, [g.id]: "" });
                      setSubDate({ ...subDate, [g.id]: "" });
                    }}>+</button>
                    <InfoHint text="Datum wählen, damit der Punkt an dem Tag im Tagesplan auftaucht." />
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={S.addRow}>
        <input style={S.input} placeholder="Neues Wochenziel" value={goalText} onChange={(e) => setGoalText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && (onAddGoal(goalText), setGoalText(""))} />
        <button style={S.addBtn} onClick={() => { onAddGoal(goalText); setGoalText(""); }}>+</button>
      </div>
    </>
  );
}

// ---------- Advanced Goals (Month / Year level: subtasks assign to a week or a day; week-scoped ones break down further into days) ----------
function AdvancedGoalsSection({ goals, label, onAddGoal, onToggleGoal, onRemoveGoal, onAddSubtask, onToggleSubtask, onRemoveSubtask, onAddChild, onToggleChild, onRemoveChild }) {
  const [goalText, setGoalText] = useState("");
  const [openGoal, setOpenGoal] = useState(null);
  const [openSub, setOpenSub] = useState(null);
  const [subText, setSubText] = useState({});
  const [subScope, setSubScope] = useState({});
  const [subDate, setSubDate] = useState({});
  const [childText, setChildText] = useState({});
  const [childDate, setChildDate] = useState({});

  return (
    <>
      <div style={S.sectionLabel}>{label}</div>
      <div style={S.list}>
        {goals.length === 0 && <div style={S.emptySmall}>Was soll hier stehen?</div>}
        {goals.map((g) => {
          const open = openGoal === g.id;
          const subs = g.subtasks || [];
          const subDone = subs.filter((s) => s.done).length;
          return (
            <div key={g.id} style={S.goalCard}>
              <div style={S.taskRowFlat}>
                <button style={{ ...S.checkbox, ...(g.done ? S.checkboxDone : {}) }} onClick={() => onToggleGoal(g.id)}>{g.done ? "✓" : ""}</button>
                <div style={{ ...S.taskTitle, flex: 1, ...(g.done ? S.taskDone : {}) }}>
                  {g.title}{subs.length > 0 && <span style={S.subCount}> · {subDone}/{subs.length}</span>}
                </div>
                <button style={S.expandBtn} onClick={() => setOpenGoal(open ? null : g.id)}>{open ? "–" : "+"}</button>
                <button style={S.removeBtn} onClick={() => onRemoveGoal(g.id)}>×</button>
              </div>
              {open && (
                <div style={S.subsWrap}>
                  {subs.map((s) => {
                    const subKey = g.id + ":" + s.id;
                    const subOpen = openSub === subKey;
                    return (
                      <div key={s.id} style={S.subBlock}>
                        <div style={S.subRow}>
                          <button style={{ ...S.checkboxSmall, ...(s.done ? S.checkboxDone : {}) }} onClick={() => onToggleSubtask(g.id, s.id)}>{s.done ? "✓" : ""}</button>
                          <div style={{ flex: 1 }}>
                            <div style={{ ...S.subTitle, ...(s.done ? S.taskDone : {}) }}>{s.title}</div>
                            {s.scope === "day" && s.date && <div style={S.subDateTag}>{fmtShort(s.date)}</div>}
                            {s.scope === "week" && s.weekKey && <div style={S.subDateTag}>{fmtWeek(s.weekKey)}{s.children?.length ? ` · ${s.children.filter(c=>c.done).length}/${s.children.length}` : ""}</div>}
                          </div>
                          {s.scope === "week" && (
                            <button style={S.expandBtnSmall} onClick={() => setOpenSub(subOpen ? null : subKey)}>{subOpen ? "–" : "+"}</button>
                          )}
                          <button style={S.removeBtn} onClick={() => onRemoveSubtask(g.id, s.id)}>×</button>
                        </div>
                        {s.scope === "week" && subOpen && (
                          <div style={S.childWrap}>
                            {(s.children || []).map((c) => (
                              <div key={c.id} style={S.childRow}>
                                <button style={{ ...S.checkboxTiny, ...(c.done ? S.checkboxDone : {}) }} onClick={() => onToggleChild(g.id, s.id, c.id)}>{c.done ? "✓" : ""}</button>
                                <div style={{ flex: 1 }}>
                                  <div style={{ ...S.childTitle, ...(c.done ? S.taskDone : {}) }}>{c.title}</div>
                                  {c.date && <div style={S.subDateTag}>{fmtShort(c.date)}</div>}
                                </div>
                                <button style={S.removeBtn} onClick={() => onRemoveChild(g.id, s.id, c.id)}>×</button>
                              </div>
                            ))}
                            <div style={S.subAddRow}>
                              <input style={S.subInput} placeholder="Tag-Aufgabe in dieser Woche …" value={childText[subKey] || ""} onChange={(e) => setChildText({ ...childText, [subKey]: e.target.value })} />
                              <input style={S.subDateInput} type="date" value={childDate[subKey] || ""} onChange={(e) => setChildDate({ ...childDate, [subKey]: e.target.value })} />
                              <button style={S.subAddBtn} onClick={() => {
                                const t = (childText[subKey] || "").trim();
                                if (!t) return;
                                onAddChild(g.id, s.id, t, childDate[subKey] || null);
                                setChildText({ ...childText, [subKey]: "" });
                                setChildDate({ ...childDate, [subKey]: "" });
                              }}>+</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}

                  <div style={S.subAddBlock}>
                    <input style={S.subInput} placeholder="Unterpunkt …" value={subText[g.id] || ""} onChange={(e) => setSubText({ ...subText, [g.id]: e.target.value })} />
                    <div style={S.scopeRow}>
                      <button style={{ ...S.scopeBtn, ...((subScope[g.id] || "day") === "day" ? S.scopeBtnActive : {}) }} onClick={() => setSubScope({ ...subScope, [g.id]: "day" })}>Tag</button>
                      <button style={{ ...S.scopeBtn, ...(subScope[g.id] === "week" ? S.scopeBtnActive : {}) }} onClick={() => setSubScope({ ...subScope, [g.id]: "week" })}>Woche</button>
                      <input style={S.subDateInput} type="date" value={subDate[g.id] || ""} onChange={(e) => setSubDate({ ...subDate, [g.id]: e.target.value })} />
                      <button style={S.subAddBtn} onClick={() => {
                        const t = (subText[g.id] || "").trim();
                        if (!t || !subDate[g.id]) return;
                        onAddSubtask(g.id, t, subScope[g.id] || "day", subDate[g.id]);
                        setSubText({ ...subText, [g.id]: "" });
                        setSubDate({ ...subDate, [g.id]: "" });
                      }}>+</button>
                      <InfoHint text='"Tag" legt den Punkt direkt in einen Tagesplan. "Woche" zeigt ihn bei der jeweiligen Woche und lässt sich dort weiter in einzelne Tage aufteilen.' />
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={S.addRow}>
        <input style={S.input} placeholder={`Neues ${label.slice(0, -1)}`} value={goalText} onChange={(e) => setGoalText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && (onAddGoal(goalText), setGoalText(""))} />
        <button style={S.addBtn} onClick={() => { onAddGoal(goalText); setGoalText(""); }}>+</button>
      </div>
    </>
  );
}

// ---------- Week View ----------
function WeekView({ data, save, cursor, setCursor, setTab }) {
  const wKey = weekKeyOf(cursor);
  const week = data.weeks[wKey] || { goals: [] };
  const start = startOfWeek(cursor);
  const days = Array.from({ length: 7 }, (_, i) => addDays(start, i));
  const fromAbove = getAssignedForWeek(data, wKey);
  const [openId, setOpenId] = useState(null);
  const [childText, setChildText] = useState({});
  const [childDate, setChildDate] = useState({});

  const updateGoals = (goals) => save({ ...data, weeks: { ...data.weeks, [wKey]: { goals } } });

  const toggleAbove = (item) => {
    const container = data[item.bucket][item.containerKey];
    const goals = container.goals.map((g) => g.id === item.goalId ? { ...g, subtasks: g.subtasks.map((s) => s.id === item.id ? { ...s, done: !s.done } : s) } : g);
    save({ ...data, [item.bucket]: { ...data[item.bucket], [item.containerKey]: { ...container, goals } } });
  };

  return (
    <div style={S.view}>
      <div style={S.sectionLabel}>Diese Woche</div>
      <div style={S.weekStrip}>
        {days.map((d, i) => {
          const k = dateKey(d);
          const items = data.days[k]?.items || [];
          const done = items.filter((t) => t.done).length;
          const isToday = dateKey(new Date()) === k;
          return (
            <button key={k} style={{ ...S.weekDay, ...(isToday ? S.weekDayToday : {}) }} onClick={() => { setCursor(d); setTab("day"); }}>
              <div style={S.weekDayLabel}>{WEEKDAYS[i]}</div>
              <div style={S.weekDayNum}>{d.getDate()}</div>
              {items.length > 0 && <div style={S.weekDayDots}>{done}/{items.length}</div>}
            </button>
          );
        })}
      </div>

      {fromAbove.length > 0 && (
        <>
          <div style={S.sectionLabel}>Aus Monats-/Jahreszielen</div>
          <div style={{ ...S.list, marginBottom: 8 }}>
            {fromAbove.map((s) => {
              const itemKey = s.bucket + s.id;
              const open = openId === itemKey;
              const children = s.children || [];
              return (
                <div key={itemKey} style={S.goalCard}>
                  <div style={S.goalTaskRow}>
                    <button style={{ ...S.checkbox, ...(s.done ? S.checkboxDone : {}) }} onClick={() => toggleAbove(s)}>{s.done ? "✓" : ""}</button>
                    <div style={{ flex: 1 }}>
                      <div style={{ ...S.taskTitle, ...(s.done ? S.taskDone : {}) }}>{s.title}</div>
                      <div style={S.goalTag}>{s.sourceLabel} · {s.goalTitle}{children.length > 0 ? ` · ${children.filter((c) => c.done).length}/${children.length} Tage` : ""}</div>
                    </div>
                    <button style={S.expandBtnSmall} onClick={() => setOpenId(open ? null : itemKey)}>{open ? "–" : "+"}</button>
                  </div>
                  {open && (
                    <div style={S.childWrap}>
                      {children.length === 0 && <div style={S.hintSmall}>Noch nicht in Tage aufgeteilt.</div>}
                      {children.map((c) => (
                        <div key={c.id} style={S.childRow}>
                          <button style={{ ...S.checkboxTiny, ...(c.done ? S.checkboxDone : {}) }} onClick={() => toggleChildGeneric(data, save, s, c.id)}>{c.done ? "✓" : ""}</button>
                          <div style={{ flex: 1 }}>
                            <div style={{ ...S.childTitle, ...(c.done ? S.taskDone : {}) }}>{c.title}</div>
                            {c.date && <div style={S.subDateTag}>{fmtShort(c.date)}</div>}
                          </div>
                          <button style={S.removeBtn} onClick={() => removeChildGeneric(data, save, s, c.id)}>×</button>
                        </div>
                      ))}
                      <div style={S.subAddRow}>
                        <input style={S.subInput} placeholder="Tag-Aufgabe …" value={childText[itemKey] || ""} onChange={(e) => setChildText({ ...childText, [itemKey]: e.target.value })} />
                        <input style={S.subDateInput} type="date" value={childDate[itemKey] || ""} onChange={(e) => setChildDate({ ...childDate, [itemKey]: e.target.value })} />
                        <button style={S.subAddBtn} onClick={() => {
                          const t = (childText[itemKey] || "").trim();
                          if (!t) return;
                          addChildGeneric(data, save, s, t, childDate[itemKey] || null);
                          setChildText({ ...childText, [itemKey]: "" });
                          setChildDate({ ...childDate, [itemKey]: "" });
                        }}>+</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      <WeekGoalsSection
        goals={week.goals}
        onAddGoal={(title) => title.trim() && updateGoals([...week.goals, { id: uid(), title: title.trim(), done: false, subtasks: [] }])}
        onToggleGoal={(id) => updateGoals(week.goals.map((g) => (g.id === id ? { ...g, done: !g.done } : g)))}
        onRemoveGoal={(id) => updateGoals(week.goals.filter((g) => g.id !== id))}
        onAddSubtask={(goalId, title, date) => updateGoals(week.goals.map((g) => (g.id === goalId ? { ...g, subtasks: [...(g.subtasks || []), { id: uid(), title, done: false, date }] } : g)))}
        onToggleSubtask={(goalId, subId) => updateGoals(week.goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.map((s) => (s.id === subId ? { ...s, done: !s.done } : s)) } : g)))}
        onRemoveSubtask={(goalId, subId) => updateGoals(week.goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.filter((s) => s.id !== subId) } : g)))}
      />
    </div>
  );
}

// ---------- Shared logic for Month / Year advanced goal sections ----------
function useAdvancedGoals(data, save, bucket, containerKey) {
  const container = data[bucket][containerKey] || { goals: [] };
  const goals = container.goals || [];
  const updateGoals = (nextGoals) => save({ ...data, [bucket]: { ...data[bucket], [containerKey]: { goals: nextGoals } } });

  return {
    goals,
    onAddGoal: (title) => title.trim() && updateGoals([...goals, { id: uid(), title: title.trim(), done: false, subtasks: [] }]),
    onToggleGoal: (id) => updateGoals(goals.map((g) => (g.id === id ? { ...g, done: !g.done } : g))),
    onRemoveGoal: (id) => updateGoals(goals.filter((g) => g.id !== id)),
    onAddSubtask: (goalId, title, scope, dateStr) => {
      const payload = scope === "week"
        ? { id: uid(), title, done: false, scope: "week", weekKey: weekKeyOf(parseDate(dateStr)), children: [] }
        : { id: uid(), title, done: false, scope: "day", date: dateStr };
      updateGoals(goals.map((g) => (g.id === goalId ? { ...g, subtasks: [...(g.subtasks || []), payload] } : g)));
    },
    onToggleSubtask: (goalId, subId) => updateGoals(goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.map((s) => (s.id === subId ? { ...s, done: !s.done } : s)) } : g))),
    onRemoveSubtask: (goalId, subId) => updateGoals(goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.filter((s) => s.id !== subId) } : g))),
    onAddChild: (goalId, subId, title, date) => updateGoals(goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.map((s) => (s.id === subId ? { ...s, children: [...(s.children || []), { id: uid(), title, done: false, date }] } : s)) } : g))),
    onToggleChild: (goalId, subId, childId) => updateGoals(goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.map((s) => (s.id === subId ? { ...s, children: s.children.map((c) => (c.id === childId ? { ...c, done: !c.done } : c)) } : s)) } : g))),
    onRemoveChild: (goalId, subId, childId) => updateGoals(goals.map((g) => (g.id === goalId ? { ...g, subtasks: g.subtasks.map((s) => (s.id === subId ? { ...s, children: s.children.filter((c) => c.id !== childId) } : s)) } : g))),
  };
}

// ---------- Month View ----------
function MonthView({ data, save, cursor, setCursor, setTab }) {
  const mKey = monthKey(cursor);
  const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const firstWeekday = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(cursor.getFullYear(), cursor.getMonth(), d));

  const goalProps = useAdvancedGoals(data, save, "months", mKey);

  return (
    <div style={S.view}>
      <div style={S.calendarGrid}>
        {WEEKDAYS.map((w) => <div key={w} style={S.calHeadCell}>{w}</div>)}
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={S.calCellEmpty} />;
          const k = dateKey(d);
          const items = data.days[k]?.items || [];
          const isToday = dateKey(new Date()) === k;
          return (
            <button key={i} style={{ ...S.calCell, ...(isToday ? S.calCellToday : {}) }} onClick={() => { setCursor(d); setTab("day"); }}>
              <span>{d.getDate()}</span>
              {items.length > 0 && <div style={S.calDot} />}
            </button>
          );
        })}
      </div>
      <AdvancedGoalsSection label="Monatsziele" {...goalProps} />
    </div>
  );
}

// ---------- Ziele (Year goals + Vision board combined behind a toggle) ----------
function ZieleView({ data, save, cursor, setCursor, setTab }) {
  const yKey = yearKey(cursor);
  const goalProps = useAdvancedGoals(data, save, "years", yKey);
  const months = Array.from({ length: 12 }, (_, i) => new Date(cursor.getFullYear(), i, 1));
  const [editingId, setEditingId] = useState(null);
  const [leitsatzDraft, setLeitsatzDraft] = useState("");

  const startEditLeitsatz = (g) => {
    setEditingId(g.id);
    setLeitsatzDraft(g.leitsatz || "");
  };
  const saveLeitsatz = (id) => {
    const goals = goalProps.goals.map((g) => (g.id === id ? { ...g, leitsatz: leitsatzDraft.trim() } : g));
    save({ ...data, years: { ...data.years, [yKey]: { goals } } });
    setEditingId(null);
  };

  return (
    <div style={S.view}>
      <div style={S.sectionLabel}>Monate</div>
      <div style={S.monthGrid}>
        {months.map((m, i) => (
          <button key={i} style={S.monthCell} onClick={() => { setCursor(m); setTab("month"); }}>
            {MONTHS[i].slice(0, 3)}
          </button>
        ))}
      </div>

      {goalProps.goals.length > 0 && (
        <>
          <div style={S.sectionLabel}>Leitsätze {cursor.getFullYear()}</div>
          <div style={{ ...S.list, marginBottom: 22 }}>
            {goalProps.goals.map((g) => (
              <div key={g.id} style={S.leitsatzCard}>
                <div style={S.leitsatzGoal}>{g.title}</div>
                {editingId === g.id ? (
                  <>
                    <textarea
                      style={S.visionTextarea}
                      placeholder="Ein Satz, ein Vers, ein Gedanke dazu …"
                      value={leitsatzDraft}
                      onChange={(e) => setLeitsatzDraft(e.target.value)}
                      autoFocus
                    />
                    <div style={S.visionEditRow}>
                      <button style={S.scopeBtn} onClick={() => setEditingId(null)}>Abbrechen</button>
                      <button style={{ ...S.scopeBtn, ...S.scopeBtnActive }} onClick={() => saveLeitsatz(g.id)}>Speichern</button>
                    </div>
                  </>
                ) : (
                  <button style={S.leitsatzText} onClick={() => startEditLeitsatz(g)}>
                    {g.leitsatz ? `„${g.leitsatz}“` : "+ Leitsatz hinzufügen"}
                  </button>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      <AdvancedGoalsSection label="Jahresziele" {...goalProps} />
    </div>
  );
}

// ---------- Tab Bar ----------
function TabBar({ tab, setTab }) {
  const tabs = [
    { id: "day", label: "Tag" },
    { id: "week", label: "Woche" },
    { id: "month", label: "Monat" },
    { id: "goals", label: "Ziele" },
  ];
  return (
    <div style={S.tabBar}>
      {tabs.map((t) => {
        const active = tab === t.id;
        return (
          <button key={t.id} style={{ ...S.tabBtn, ...(active ? S.tabBtnActive : {}) }} onClick={() => setTab(t.id)}>
            <span style={{ ...S.tabDot, ...(active ? S.tabDotActive : {}) }} />
            <span style={S.tabLabel}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}
